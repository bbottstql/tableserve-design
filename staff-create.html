<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TableServe — New Staff</title>
    <link
      rel="stylesheet"
      href="/node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    {{> header}}
    <main class="d-flex">
      {{> nav}}
      <section class="content p-4 flex-grow-1">
        <div
          class="d-flex justify-content-between pb-4 mb-4 border-bottom border-2"
        >
          <h2>New Staff</h2>
        </div>
        <form class="d-flex flex-wrap flex-column w75 gap-2">
          <div class="d-flex w-75 gap-2">
            <div class="mb-3 w-50">
              <label for="firstname" class="form-label">First Name</label>
              <input
                id="firstname"
                type="text"
                class="form-control"
                placeholder="Enter first name"
              />
            </div>
            <div class="mb-3 w-50">
              <label for="lastname" class="form-label">Last Name</label>
              <input
                type="text"
                id="lastname"
                class="form-control"
                placeholder="Enter last name"
              />
            </div>
          </div>
          <div class="d-flex w-75 gap-2">
            <div class="mb-3 w-50">
              <label for="email" class="form-label">Email</label>
              <input
                id="email"
                type="email"
                class="form-control"
                placeholder="Enter email"
              />
            </div>
            <div class="mb-3 w-50">
              <label for="phone" class="form-label">Phone</label>
              <input
                inputtype="text"
                id="phone"
                class="form-control"
                placeholder="Enter phone number"
              />
            </div>
          </div>
          <div class="d-flex w-75 gap-2">
            <div class="mb-3 w-50">
              <label for="username" class="form-label">Username</label>
              <input
                id="username"
                type="text"
                class="form-control"
                placeholder="Enter username"
              />
            </div>
            <div class="mb-3 w-50">
              <label for="password" class="form-label">Password</label>
              <input
                type="password"
                id="password"
                class="form-control"
                placeholder="Enter password"
              />
            </div>
          </div>
          <div class="d-flex w-75 gap-2">
            <label for="role" class="form-label">Role</label>
          </div>
          <div class="d-flex w-75 gap-2">
            <input
              class="form-check-input"
              type="checkbox"
              name="radioDefault"
              id="radioDefault1"
            />
            <label for="roleadmin" class="form-label">Manager</label>

            <input
              class="form-check-input"
              type="checkbox"
              name="radioDefault"
              id="radioDefault1"
            />
            <label for="roleadmin" class="form-label">Admin</label>
          </div>
        </form>
      </section>
    </main>
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
