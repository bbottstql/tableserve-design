<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TableServe — New Order</title>
    <link
      rel="stylesheet"
      href="/node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    {{> header}}
    <main class="d-flex">
      {{> nav}}
      <section class="content p-4 flex-grow-1">
        <div
          class="d-flex justify-content-between pb-4 mb-4 border-bottom border-2"
        >
          <h2>New Order</h2>
        </div>
        <form class="d-flex flex-column w-75">
          <div class="mb-3 w-75">
            <label for="tablenumber" class="form-label">Table Number</label>
            <input
              id="tablenumber"
              class="form-control"
              type="number"
              placeholder="Enter the table number"
            />
          </div>
          <div class="mb-3 w-75">
            <label for="notes" class="form-label">Notes</label>
            <textarea
              name=""
              id="notes"
              class="form-control"
              placeholder="Enter any notes for this order (optional)"
            ></textarea>
          </div>
          <div class="d-flex flex-row gap-4 w-75">
            <div class="mb-3 w-50">
              <label for="status" class="form-label">Status</label>
              <select name="" id="status" class="form-select" disabled>
                <option value="PLACED">Placed</option>
                <option value="PREPARING">Preparing</option>
                <option value="READY">Ready</option>
                <option value="SERVED">Served</option>
                <option value="CANCELLED">Cancelled</option>
              </select>
            </div>
          </div>
          <div class="d-flex flex-row gap-4 w-75">
            <div class="mb-3 w-50">
              <label for="staff" class="form-label">Staff</label>
              <select name="" id="staff" class="form-select" disabled>
                <option value="">Jordan Reyes</option>
              </select>
            </div>
          </div>
          <div class="row-3 d-flex flex-row justify-content-end w-100 gap-4">
            <div class="d-flex justify-content-end mt-4">
              <a href="/orders.html" class="btn btn-outline-primary me-2"
                >Cancel</a
              >
              <button type="submit" class="btn btn-primary">
                <svg
                  class="bi pe-none me-2"
                  width="16"
                  height="16"
                  fill="#FFFFFF"
                >
                  <use href="/assets/bootstrap-icons.svg#save" />
                </svg>
                Save item
              </button>
            </div>
          </div>
        </form>
      </section>
    </main>
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/validation.js"></script>
  </body>
</html>
